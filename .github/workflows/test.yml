name: tests

on:
  push:         {branches: [master]}
  pull_request: {branches: [master]}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        go:   ["1.26.x", "1.25.x"]
        arch: ["amd64", "386"]

    env:
      GOARCH: "${{matrix.arch}}"

    steps:
      - uses: actions/checkout@v7

      - uses: WillAbides/setup-go-faster@v1
        with:
          go-version: ${{matrix.go}}

      - name: build
        run: make all

      - name: test
        run: ./test.sh

  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  code-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: stable

      - name: generate coverage
        run: go test -covermode=count -coverprofile=coverage.out ./...

      - name: send coverage
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.out
          format: golang
